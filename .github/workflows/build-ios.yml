name: 编译节拍器 IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  VERSION: '1.1.0'
  BUILD: ${{ github.run_number }}

jobs:
  build-ios:
    name: 编译 iOS .ipa
    runs-on: macos-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: 'stable'

      - name: 获取依赖
        run: flutter pub get

      - name: 编译 Release
        run: flutter build ios --release --no-codesign

      - name: 打包 .ipa
        run: |
          IPANAME="DidaDida_v${VERSION}+${BUILD}.ipa"
          mkdir -p build/ios/ipa/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r "${GITHUB_WORKSPACE}/${IPANAME}" Payload/
          echo "IPA_FILE=${IPANAME}" >> $GITHUB_ENV

      - name: 上传 .ipa
        uses: actions/upload-artifact@v4
        with:
          name: DidaDida_v${{ env.VERSION }}+${{ env.BUILD }}
          path: ${{ github.workspace }}/DidaDida_v${{ env.VERSION }}+${{ env.BUILD }}.ipa
